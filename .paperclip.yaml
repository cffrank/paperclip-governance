schema: paperclip/v1

http_adapters:
  - http-adapters/cloudflare-ai-gateway.yaml

agents:
  # --- C-Suite ---
  chief-of-staff:
    adapter:
      type: http
      adapter_id: cloudflare-ai-gateway
      config:
        model: "workers-ai/@cf/moonshot-ai/kimi-k2.5"
        dangerouslySkipPermissions: true
        maxTurnsPerRun: 300
    runtime:
      heartbeat:
        enabled: true
        intervalSec: 1800
        wakeOnDemand: true

  cfo:
