schema: paperclip/v1
agents:
  chief-of-staff:
    adapter:
      type: claude_local
      config:
        model: claude-opus-4-6
        dangerouslySkipPermissions: true
        maxTurnsPerRun: 300
    runtime:
      heartbeat:
        enabled: true
        intervalSec: 600
        wakeOnDemand: true
  cfo:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
        dangerouslySkipPermissions: true
        maxTurnsPerRun: 300
    runtime:
      heartbeat:
        enabled: true
        intervalSec: 900
        wakeOnDemand: true
  coo:
    adapter:
      type: claude_local
      config:
        model: claude-sonnet-4-6
        dangerouslySkipPermissions: true
        maxTurnsPerRun: 300
    runtime:
      heartbeat:
        enabled: true
        intervalSec: 600
        wakeOnDemand: true
